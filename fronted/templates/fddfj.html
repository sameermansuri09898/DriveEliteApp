<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Cards</title>

<style>
body{
  background:#f4f6f9;
  font-family:Arial;
  padding:20px;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}

.card{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
}

.card-header{
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  font-weight:bold;
}

.heart{
  background:#eee;
  padding:8px;
  border-radius:50%;
}

.car-img{
  width:100%;
  height:200px;
  object-fit:contain;
  background:#f2f2f2;
}

.card-body{
  padding:20px;
}

.title{
  font-size:20px;
  font-weight:bold;
}

.sub{
  color:#777;
  margin:5px 0 10px;
}

.tags{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tag{
  background:#eef1f5;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
}

.footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-top:1px solid #eee;
  padding-top:15px;
}

.owner{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  background:#3b5bdb;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.owner-name{
  font-weight:bold;
}

.owner-tag{
  font-size:12px;
  color:#777;
}

.price-box{
  text-align:right;
}

.discount{
  background:#ffe5e5;
  color:red;
  padding:4px 8px;
  border-radius:10px;
  font-size:12px;
}

.price{
  font-size:18px;
  font-weight:bold;
}

.btn{
  margin-top:15px;
  width:100%;
  padding:10px;
  border:none;
  background:#0d6efd;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
}

.btn:disabled{
  background:gray;
}

</style>
</head>
<body>

<h2>🚗 Cars</h2>

<div class="container" id="cars"></div>

<script>

fetch("http://127.0.0.1:8000/api/carslist/")
.then(res=>res.json())
.then(data=>{

  const container = document.getElementById("cars");

  data.forEach(car=>{

    const price = car.price_per_day - (car.price_per_day * car.offer / 100);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `

    <div class="card-header">
      <div class="brand">${car.brand}</div>
      <div class="heart">❤️</div>
    </div>

    <img class="car-img" src="http://127.0.0.1:8000${car.car_thumbnail}" />

    <div class="card-body">
      <div class="title">${car.name}</div>
      <div class="sub">${car.model} · Petrol</div>

      <div class="tags">
        <div class="tag">📍 ${car.pickup_location}</div>
        <div class="tag">📍 ${car.dropoff_location}</div>
      </div>

      <div class="footer">
        <div class="owner">
          <div class="avatar">${car.name[0]}</div>
          <div>
            <div class="owner-name">Owner</div>
            <div class="owner-tag">User</div>
          </div>
        </div>

        <div class="price-box">
          <div class="discount">${car.offer}% Off</div>
          <div class="price">₹${price.toFixed(0)}/day</div>
        </div>
      </div>

      <button class="btn" onclick="book(${car.id})" ${!car.is_available ? 'disabled' : ''}>
        ${car.is_available ? 'Book Now' : 'Booked'}
      </button>

    </div>

    `;

    container.appendChild(card);

  });

});

function book(id){
  window.location.href = `../services/booking.html?carId=${id}`;
}

</script>

</body>
</html>
