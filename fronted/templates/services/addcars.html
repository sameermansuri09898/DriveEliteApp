<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Car</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1494976388531-d1058494cdd8') center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 500px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    color: white;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* GRID */
.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

@media(max-width:600px){
    .form-row {
        grid-template-columns: 1fr;
    }
}

.form-group {
    margin-bottom: 12px;
}

label {
    font-size: 13px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #333;
    background: rgba(255,255,255,0.05);
    color: white;
}

input:focus, textarea:focus {
    border-color: #00c6ff;
    outline: none;
}

/* ERROR */
.error {
    color: #ff4d4d;
    font-size: 12px;
}

input.error-border, textarea.error-border {
    border-color: #ff4d4d;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

button:hover {
    transform: scale(1.02);
}

/* STATUS */
.loading {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
}

.success {
    text-align: center;
    color: #00ffae;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<h2>🚗 Add Car</h2>

<form id="carForm">

<div class="form-row">
<div class="form-group">
<label>Name</label>
<input type="text" id="name">
<div class="error" id="nameError"></div>
</div>

<div class="form-group">
<label>Brand</label>
<input type="text" id="brand">
<div class="error" id="brandError"></div>
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>Model</label>
<input type="text" id="model">
<div class="error" id="modelError"></div>
</div>

<div class="form-group" style="display: none;">
<label>Car Owner</label>
<input type="text" id="owner" value="">
<div class="error" id="ownerError"></div>
</div>

<div class="form-group">
<label>Price</label>
<input type="number" id="price">
<div class="error" id="priceError"></div>
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>Offer (%)</label>
<input type="number" id="offer">
<div class="error" id="offerError"></div>
</div>

<div class="form-group">
<label>Fine</label>
<input type="number" id="fine">
<div class="error" id="fineError"></div>
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>Pickup</label>
<input type="text" id="pickup">
<div class="error" id="pickupError"></div>
</div>

<div class="form-group">
<label>Dropoff</label>
<input type="text" id="dropoff">
<div class="error" id="dropoffError"></div>
</div>
</div>

<div class="form-group">
<label>Description</label>
<textarea id="desc"></textarea>
<div class="error" id="descError"></div>
</div>

<div class="form-group">
<label>Thumbnail</label>
<input type="file" id="thumbnail">
<div class="error" id="thumbnailError"></div>
</div>

<div class="form-group">
<label>Images</label>
<input type="file" id="images" multiple>
<div class="error" id="imagesError"></div>
</div>

<button type="submit" id="submitBtn">Add Car</button>

<div class="loading" id="loading"></div>
<div class="success" id="successMsg"></div>

</form>
</div>

<script>
const form = document.getElementById("carForm");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", async function(e){
    e.preventDefault();

    clearErrors();

    btn.disabled = true;
    btn.innerText = "Processing...";
    document.getElementById("loading").innerHTML = "⏳ Uploading...";

    let formData = new FormData();

    formData.append("name", name.value);
    formData.append("brand", brand.value);
    formData.append("model", model.value);
    formData.append("price_per_day", price.value);
    formData.append("offer", offer.value);
    formData.append("fine_per_day", fine.value);
    formData.append("pickup_location", pickup.value);
    formData.append("dropoff_location", dropoff.value);
    formData.append("description", desc.value);
    formData.append("owner", owner.value);

    if (thumbnail.files[0]) {
        formData.append("car_thumbnail", thumbnail.files[0]);
    }

    for (let i = 0; i < images.files.length; i++) {
        formData.append("images", images.files[i]);
    }

    try {
        let res = await fetch("http://127.0.0.1:8000/api/cars/", {
            method: "POST",
            body: formData
        });

        let data = await res.json();

        if (!res.ok) {
            handleErrors(data);
        } else {
            document.getElementById("successMsg").innerHTML = "✅ Car Added Successfully!";
            form.reset();
        }

    } catch(err) {
        alert("Server error!");
    }

    btn.disabled = false;
    btn.innerText = "Add Car";
    document.getElementById("loading").innerHTML = "";
});

function clearErrors() {
    document.querySelectorAll(".error").forEach(el => el.innerHTML = "");
    document.querySelectorAll("input, textarea").forEach(el => el.classList.remove("error-border"));
    document.getElementById("successMsg").innerHTML = "";
}

function handleErrors(errors) {

    const fieldMap = {
        name: "name",
        brand: "brand",
        model: "model",
        price_per_day: "price",
        offer: "offer",
        fine_per_day: "fine",
        pickup_location: "pickup",
        dropoff_location: "dropoff",
        description: "desc",
        car_thumbnail: "thumbnail",
        images: "images",
        owner: "owner"
    };

    for (let field in errors) {

        let message = errors[field].join(", ");

        if (field === "non_field_errors") {
            alert(message);
            continue;
        }

        let inputId = fieldMap[field];

        if (inputId) {
            let input = document.getElementById(inputId);
            input.classList.add("error-border");

            let errorDiv = document.getElementById(inputId + "Error");
            if (errorDiv) {
                errorDiv.innerHTML = message;
            }
        }
    }
}
</script>

</body>
</html>
