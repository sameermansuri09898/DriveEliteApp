<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Details</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f4f6f9;
}

.container {
  max-width: 1100px;
  margin: 30px auto;
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
}

.car-img {
  width: 100%;
  height: 280px;
  object-fit: cover;
  border-radius: 12px;
}

.thumbnails {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.thumbnails img {
  width: 70px;
  height: 70px;
  border-radius: 8px;
  cursor: pointer;
  object-fit: cover;
  border: 2px solid transparent;
}

.thumbnails img:hover {
  border-color: #007bff;
}

.title {
  font-size: 28px;
  font-weight: bold;
}

.sub {
  color: #666;
  margin-top: 5px;
}

.features {
  margin-top: 15px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.tag {
  background: #eef2f7;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 13px;
}

.price-box {
  margin-top: 20px;
  background: #f9fafb;
  padding: 15px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
}

.price {
  font-size: 22px;
  font-weight: bold;
}

.old-price {
  text-decoration: line-through;
  color: #888;
}

.discount {
  color: green;
  font-weight: 600;
}

.owner {
  margin-top: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: #007bff;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.btn {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.btn:hover {
  background: #15803d;
}

.tabs {
  margin-top: 30px;
  display: flex;
  gap: 20px;
  border-bottom: 1px solid #ddd;
}

.tab {
  padding-bottom: 10px;
  cursor: pointer;
}

.active {
  border-bottom: 2px solid #16a34a;
  color: #16a34a;
  font-weight: bold;
}

.content {
  margin-top: 15px;
  color: #555;
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="grid">

    <!-- LEFT -->
    <div>
      <img id="mainImage" class="car-img" />
      <div class="thumbnails" id="thumbnails"></div>
    </div>

    <!-- RIGHT -->
    <div>
      <div class="title" id="title"></div>
      <div class="sub" id="model"></div>

      <div class="features" id="features"></div>

      <div class="price-box">
        <div>
          <div>Original</div>
          <div class="old-price" id="oldPrice"></div>
        </div>
        <div>
          <div>Now</div>
          <div class="price" id="newPrice"></div>
          <div class="discount" id="discount"></div>
        </div>
      </div>

      <div class="owner">
        <div class="avatar" id="avatar"></div>
        <div id="owner"></div>
      </div>
      <div class="days-count" style="display: flex; align-items: center; justify-content: space-between; margin-top: 20px;">
        <div class="days">
          <label for="days">Days Book:</label>
        <input type="number" id="days" name="days" min="1" max="30" value="" style="border: 1px solid #ccc; padding: 5px; border-radius: 5px; font-size: medium;" oninput="totalprice()"></div>
       <div class="total_price" style="align-items: center;">
        <h1 style="font-size: medium;" id="livetotalprice"></h1>
       </div>
      </div>

      <button class="btn" id="bookBtn">Book Now</button>
      <button class="btn" id="addcartBtn" onclick="addtocart()">Add To Cart</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('details', this)">Details</div>
    <div class="tab" onclick="showTab('extra', this)">Extra Info</div>
  </div>

  <div id="details" class="content"></div>
  <div id="extra" class="content" style="display:none;"></div>

</div>

<script>

const id = new URLSearchParams(window.location.search).get("id");

// 🔥 GLOBAL STATE
let priceproduct = 0;
let selected_days = 1;

// 🚗 FETCH CAR DATA
fetch(`http://127.0.0.1:8000/api/cars/${id}/`)
.then(res => res.json())
.then(car => {

  const newPrice = car.price_per_day - (car.price_per_day * car.offer / 100);

  // ✅ SET PRICE
  priceproduct = newPrice;

  // UI DATA
  document.getElementById("mainImage").src = car.car_thumbnail;
  document.getElementById("title").innerText = `${car.car_name} - ${car.brand}`;
  document.getElementById("model").innerText = car.model;

  document.getElementById("oldPrice").innerText = `₹${car.price_per_day}`;
  document.getElementById("newPrice").innerText = `₹${newPrice.toFixed(0)}`;
  document.getElementById("discount").innerText = `${car.offer}% OFF`;

  document.getElementById("owner").innerText = car.owner_name || "Owner";
  document.getElementById("avatar").innerText =
    car.owner_name ? car.owner_name[0].toUpperCase() : "U";

  document.getElementById("features").innerHTML = `
    <div class="tag">🚗 ${car.seated_capacity} Seats</div>
    <div class="tag">⚙️ ${car.controle}</div>
    <div class="tag">📍 ${car.pickup_location}</div>
    <div class="tag">📍 ${car.dropoff_location}</div>
    <div class="tag">💰 Fine: ₹${car.fine_per_day}/day</div>
  `;

  document.getElementById("details").innerText = car.description;

  document.getElementById("extra").innerHTML = `
    <p><strong>Available:</strong> ${car.is_available ? "Yes" : "No"}</p>
    <p><strong>Created:</strong> ${car.created_at}</p>
  `;

  // 🖼 IMAGES
  const thumbnails = document.getElementById("thumbnails");

  if (car.images && car.images.length > 0) {
    car.images.forEach(img => {
      const el = document.createElement("img");
      el.src = img.image;
      el.onclick = () => changeImage(img.image);
      thumbnails.appendChild(el);
    });
  } else {
    thumbnails.innerHTML = `<img src="${car.car_thumbnail}" onclick="changeImage('${car.car_thumbnail}')">`;
  }

  // ❌ Disable button if not available
  const btn = document.getElementById("bookBtn");
  if (!car.is_available) {
    btn.innerText = "Not Available";
    btn.disabled = true;
    btn.style.background = "#ccc";
  }

  // 🔥 INITIAL TOTAL
  totalprice();

});

// 🖼 CHANGE IMAGE
function changeImage(src) {
  document.getElementById("mainImage").src = src;
}

// 📑 TAB SWITCH
function showTab(tabId, element) {
  document.getElementById('details').style.display = 'none';
  document.getElementById('extra').style.display = 'none';
  document.getElementById(tabId).style.display = 'block';

  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  element.classList.add('active');
}

// 💰 TOTAL PRICE CALCULATION
function totalprice() {
  selected_days = Number(document.getElementById("days").value);

  if (!selected_days || selected_days < 1) {
    selected_days = 1;
    document.getElementById("days").value = 1;
  }

  const total = selected_days * priceproduct;

  document.getElementById("livetotalprice").innerText = `₹${total}`;
}

// 🛒 ADD TO CART
function addtocart() {

  const token = localStorage.getItem('token');

  if (!token) {
    alert('⚠️ Please login first');
    return;
  }

  fetch('http://localhost:8000/api/add-to-cart/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Token ' + token
    },
    body: JSON.stringify({
      car: id,                // ✅ correct
      days: selected_days     // ✅ correct
    })
  })
  .then(res => res.json())
  .then(data => {
    console.log(data);

    if (data.message) {
      alert("✅ " + data.message);
    } else {
      alert("❌ " + data.error);
    }
  })
  .catch(err => {
    console.error(err);
    alert("Something went wrong");
  });
}

</script>
</body>
</html>
