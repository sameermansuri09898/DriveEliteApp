<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logout - Car Rental</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
    }

    .logout-card{
      background:#fff;
      padding:40px;
      border-radius:15px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      width:90%;
      max-width:400px;
    }

    .logout-card h2{
      margin-bottom:10px;
      color:#333;
    }

    .logout-card p{
      margin-bottom:20px;
      color:#777;
    }

    .btn{
      padding:12px 20px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:15px;
      margin:5px;
    }

    .logout{
      background:#e60023;
      color:#fff;
    }

    .logout:hover{background:#c4001d}

    .cancel{
      background:#ddd;
    }

    .cancel:hover{background:#bbb}

    @media(max-width:500px){
      .logout-card{padding:25px}
    }
  </style>
</head>

<body>

<div class="logout-card">
  <h2>Logout</h2>
  <p>Are you sure you want to logout?</p>

  <button class="btn logout" onclick="logoutUser()">Yes, Logout</button>
  <button class="btn cancel" onclick="goBack()">Cancel</button>
</div>

<script>
function logoutUser(){
  const token = localStorage.getItem('token');

  fetch('http://127.0.0.1:8000/api/logout/',{
    method:'POST',
    headers:{
      'Authorization': `Token ${token}`
    }
  })
  .then(res => res.json())
  .then(data => {
    localStorage.removeItem('token');
    window.location.href = 'login.html';
  })
  .catch(err => {
    console.error(err);
    alert('Error logging out');
  });
}

function goBack(){
  window.history.back();
}
</script>

</body>
</html>
